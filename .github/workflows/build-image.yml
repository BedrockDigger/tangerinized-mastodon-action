name: Build Mastodon Docker Images
on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ secrets.DOCKERHUB_REPOSITORY }}

jobs:
  check-for-release:
    runs-on: ubuntu-latest
    outputs:
      found_new_release: ${{ steps.check-for-release.outputs.found_new_release }}
      tag: ${{ steps.check-for-release.outputs.tag }}
    steps:
      - name: Check for new Mastodon release
        id: check-for-release
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
        run: |
          GITHUB_TAG=$(curl -sf https://api.github.com/repos/mastodon/mastodon/releases/latest | jq -r '.tag_name')
          echo "The latest release is $GITHUB_TAG"
          echo "tag=$GITHUB_TAG" >> $GITHUB_OUTPUT

          DOCKERHUB_ACCESS_TOKEN=$(curl -sf --location 'https://hub.docker.com/v2/auth/token' \
            --header 'Content-Type: application/json' \
            --data "{\"identifier\":\"${DOCKERHUB_USERNAME}\",\"secret\":\"${DOCKERHUB_TOKEN}\"}" | jq -r '.access_token')

          DOCKERHUB_TAG=$(curl -sf --location "https://hub.docker.com/v2/namespaces/${DOCKERHUB_NAMESPACE}/repositories/${DOCKERHUB_REPOSITORY}/tags" \
            --header "Authorization: Bearer $DOCKERHUB_ACCESS_TOKEN" | jq -r '.results[1].name')
          echo "The latest Docker Hub tag is $DOCKERHUB_TAG"

          if [ "$GITHUB_TAG" != "$DOCKERHUB_TAG" ]; then
            echo "found_new_release=true" >> $GITHUB_OUTPUT
          else
            echo "found_new_release=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-for-release
    if: needs.check-for-release.outputs.found_new_release == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    outputs:
      tag: ${{ needs.check-for-release.outputs.tag }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout Mastodon
        uses: actions/checkout@v4
        with:
          repository: mastodon/mastodon
          ref: ${{ needs.check-for-release.outputs.tag }}
          path: mastodon

      - name: Checkout TangerineUI
        uses: actions/checkout@v4
        with:
          repository: nileane/TangerineUI-for-Mastodon
          ref: main
          path: tgui

      - name: Copy Tangerine UI files and configure themes
        run: |
          cp -r ./tgui/mastodon/app/javascript/styles/* ./mastodon/app/javascript/styles
          cat >> ./mastodon/config/themes.yml <<'EOF'
          tangerineui: styles/tangerineui.scss
          tangerineui-purple: styles/tangerineui-purple.scss
          tangerineui-cherry: styles/tangerineui-cherry.scss
          tangerineui-lagoon: styles/tangerineui-lagoon.scss
          EOF

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: mastodon
          file: mastodon/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ github.ref_name }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - check-for-release
      - build
    if: always() && needs.build.result == 'success'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          RELEASE_TAG: ${{ needs.check-for-release.outputs.tag }}
        run: |
          if [ -z "$(ls -A)" ]; then
            echo "::error::No digest files found, cannot create manifest"
            exit 1
          fi

          TAG_ARGS="-t ${{ env.IMAGE_NAME }}:latest"

          if [ -n "$RELEASE_TAG" ] && [ "$RELEASE_TAG" != "null" ]; then
            TAG_ARGS="$TAG_ARGS -t ${{ env.IMAGE_NAME }}:$RELEASE_TAG"
          fi

          DIGEST_ARGS=$(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

          echo "Creating manifest with tags: $TAG_ARGS"
          echo "Using digests: $DIGEST_ARGS"
          docker buildx imagetools create $TAG_ARGS $DIGEST_ARGS

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:latest
